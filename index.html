<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>台灣山域搜救 · 教學平台</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;600;700&family=Noto+Sans+TC:wght@400;500;700;900&family=Noto+Serif+TC:wght@600;700;900&display=swap" rel="stylesheet">
<style>
:root {
  --paper:  #F5F0E8;
  --stone:  #EDE7D9;
  --stone2: #E3DDD0;
  --rule:   #CFC9BC;
  --ink:    #1C1A17;
  --dim:    #6B6560;
  --dim2:   #9A948E;
  --fire:   #C8401A;
  --amber:  #B89030;
  --safe:   #2E7D52;
  --slate:  #2C4A6E;
  --moss:   #3D5C3A;
  --mono: 'IBM Plex Mono', monospace;
  --serif: 'Noto Serif TC', serif;
  --sans:  'Noto Sans TC', sans-serif;
  --nav-h: 52px;
  --spine: 4px;
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html, body { height: 100%; overflow: hidden; background: var(--paper); font-family: var(--sans); -webkit-font-smoothing: antialiased; }

/* ── SPINE ── */
.spine { position: fixed; left: 0; top: 0; bottom: 0; width: var(--spine); background: var(--fire); z-index: 200; }

/* ── TOP NAV ── */
.top-nav {
  position: fixed; top: 0; left: var(--spine); right: 0;
  height: var(--nav-h);
  background: var(--paper);
  border-bottom: 1px solid var(--rule);
  display: flex; align-items: center;
  padding: 0 1.25rem;
  gap: 1rem;
  z-index: 100;
}
.nav-logo {
  font-family: var(--mono); font-weight: 700; font-size: 13px;
  color: var(--fire); letter-spacing: .08em; white-space: nowrap; flex: none;
}
.nav-divider { width: 1px; height: 20px; background: var(--rule); flex: none; }

.nav-batch-group {
  display: flex; align-items: center; gap: .2rem;
}
.nav-batch-label {
  font-family: var(--mono); font-size: 10px; font-weight: 700;
  color: var(--dim2); letter-spacing: .12em;
  padding: 0 .4rem; white-space: nowrap; flex: none;
}
.nav-btn {
  font-family: var(--mono); font-size: 11px; font-weight: 600;
  color: var(--dim); text-decoration: none;
  padding: .3rem .6rem; border-radius: 4px;
  white-space: nowrap; transition: .15s; cursor: pointer;
  border: none; background: none;
  border-left: 3px solid transparent;
}
.nav-btn:hover { color: var(--ink); background: var(--stone); }
.nav-btn.active { color: var(--fire); background: #C8401A14; }

/* layer accent borders */
.nav-btn[data-layer="A"]  { border-left-color: var(--fire); }
.nav-btn[data-layer="E"]  { border-left-color: #9B5E1A; }
.nav-btn[data-layer="B"]  { border-left-color: var(--moss); }
.nav-btn[data-layer="C"]  { border-left-color: var(--slate); }
.nav-btn[data-layer="D"]  { border-left-color: #4A4540; }

.nav-spacer { flex: 1; }
.nav-meta {
  font-family: var(--mono); font-size: 10px; color: var(--dim2);
  text-align: right; line-height: 1.5; flex: none;
}

/* ── IFRAME CONTAINER ── */
.frame-wrap {
  position: fixed;
  top: var(--nav-h); left: var(--spine); right: 0; bottom: 0;
  overflow: hidden;
}
.batch-frame {
  position: absolute; inset: 0;
  width: 100%; height: 100%;
  border: none;
  display: none;
  background: var(--paper);
}
.batch-frame.visible { display: block; }

/* ── LOADING OVERLAY ── */
.loading {
  position: absolute; inset: 0;
  display: flex; align-items: center; justify-content: center;
  flex-direction: column; gap: 1rem;
  background: var(--paper);
  z-index: 10;
  pointer-events: none;
  transition: opacity .4s;
}
.loading.hidden { opacity: 0; }
.loading-spinner {
  width: 36px; height: 36px;
  border: 3px solid var(--rule);
  border-top-color: var(--fire);
  border-radius: 50%;
  animation: spin .8s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }
.loading-text {
  font-family: var(--mono); font-size: 12px; color: var(--dim2);
  letter-spacing: .1em;
}

/* ── SCROLL INDICATOR ── */
.scroll-hint {
  position: fixed; bottom: 1.5rem; right: 1.5rem;
  background: var(--paper); border: 1px solid var(--rule);
  border-radius: 8px; padding: .5rem .85rem;
  font-family: var(--mono); font-size: 11px; color: var(--dim2);
  z-index: 50; opacity: 0; transition: opacity .3s;
  pointer-events: none;
}
.scroll-hint.show { opacity: 1; }

/* ── BATCH INDICATOR ── */
.batch-indicator {
  position: fixed; bottom: 1.5rem; left: calc(var(--spine) + 1.5rem);
  display: flex; gap: .4rem; z-index: 50;
}
.bi-dot {
  width: 28px; height: 4px; border-radius: 2px;
  background: var(--rule); transition: background .25s, width .25s;
  cursor: pointer;
}
.bi-dot.active { background: var(--fire); width: 36px; }
.bi-dot[data-b="1"] { background: var(--fire); }
.bi-dot[data-b="1"].active { background: var(--fire); }
.bi-dot[data-b="2"] { background: var(--moss); }
.bi-dot[data-b="2"].active { background: var(--moss); }
.bi-dot[data-b="3"] { background: var(--slate); }
.bi-dot[data-b="3"].active { background: var(--slate); }
.bi-dot[data-b="4"] { background: #4A4540; }
.bi-dot[data-b="4"].active { background: #4A4540; }
</style>
</head>
<body>

<div class="spine"></div>

<!-- TOP NAV -->
<nav class="top-nav">
  <div class="nav-logo">SAR // TW</div>
  <div class="nav-divider"></div>

  <!-- Batch 1: Hero + A + E -->
  <div class="nav-batch-group">
    <span class="nav-batch-label">A·E</span>
    <button class="nav-btn active" data-batch="1" data-layer="A" data-anchor="hero">首頁</button>
    <button class="nav-btn" data-batch="1" data-layer="A" data-anchor="a1">四個詞</button>
    <button class="nav-btn" data-batch="1" data-layer="A" data-anchor="a2">失溫333</button>
    <button class="nav-btn" data-batch="1" data-layer="E" data-anchor="e1">危害速查</button>
    <button class="nav-btn" data-batch="1" data-layer="E" data-anchor="e2">捷思陷阱</button>
    <button class="nav-btn" data-batch="1" data-layer="E" data-anchor="e3">評估表</button>
  </div>

  <div class="nav-divider"></div>

  <!-- Batch 2: B + C1 -->
  <div class="nav-batch-group">
    <span class="nav-batch-label">B·C1</span>
    <button class="nav-btn" data-batch="2" data-layer="B" data-anchor="b1">環境認知</button>
    <button class="nav-btn" data-batch="2" data-layer="B" data-anchor="b2">搜救決策</button>
    <button class="nav-btn" data-batch="2" data-layer="B" data-anchor="b3">失蹤者</button>
    <button class="nav-btn" data-batch="2" data-layer="C" data-anchor="c1">繩索力學</button>
  </div>

  <div class="nav-divider"></div>

  <!-- Batch 3: C2 + C3 -->
  <div class="nav-batch-group">
    <span class="nav-batch-label">C2·C3</span>
    <button class="nav-btn" data-batch="3" data-layer="C" data-anchor="c2">固定點</button>
    <button class="nav-btn" data-batch="3" data-layer="C" data-anchor="c3">情境模擬</button>
  </div>

  <div class="nav-divider"></div>

  <!-- Batch 4: D -->
  <div class="nav-batch-group">
    <span class="nav-batch-label">D</span>
    <button class="nav-btn" data-batch="4" data-layer="D" data-anchor="d1">三地統計</button>
    <button class="nav-btn" data-batch="4" data-layer="D" data-anchor="d2">YOSAR</button>
  </div>

  <div class="nav-spacer"></div>
  <div class="nav-meta">北搜 徐汶翰<br>僅供訓練參考</div>
</nav>

<!-- IFRAME PANELS -->
<div class="frame-wrap">
  <div class="loading" id="loading">
    <div class="loading-spinner"></div>
    <div class="loading-text">載入中…</div>
  </div>
  <iframe class="batch-frame visible" id="frame-1" src="sar_training_batch1.html" title="Batch 1"></iframe>
  <iframe class="batch-frame" id="frame-2" src="" data-src="sar_training_batch2.html" title="Batch 2"></iframe>
  <iframe class="batch-frame" id="frame-3" src="" data-src="sar_training_batch3.html" title="Batch 3"></iframe>
  <iframe class="batch-frame" id="frame-4" src="" data-src="sar_training_batch4.html" title="Batch 4"></iframe>
</div>

<!-- BATCH DOTS -->
<div class="batch-indicator">
  <div class="bi-dot active" data-b="1" title="A · E 層"></div>
  <div class="bi-dot" data-b="2" title="B · C1 層"></div>
  <div class="bi-dot" data-b="3" title="C2 · C3 層"></div>
  <div class="bi-dot" data-b="4" title="D 層"></div>
</div>

<div class="scroll-hint" id="scroll-hint">↑↓ 可在子頁面內捲動</div>

<script>
(function () {
  'use strict';

  let currentBatch = 1;
  const loaded = new Set([1]);

  function getFrame(b) { return document.getElementById('frame-' + b); }

  function switchBatch(b) {
    if (b === currentBatch) return;

    // lazy-load iframe
    const frame = getFrame(b);
    if (!loaded.has(b)) {
      document.getElementById('loading').classList.remove('hidden');
      frame.src = frame.dataset.src;
      frame.addEventListener('load', () => {
        document.getElementById('loading').classList.add('hidden');
      }, { once: true });
      loaded.add(b);
    }

    // swap visible
    document.querySelectorAll('.batch-frame').forEach(f => f.classList.remove('visible'));
    frame.classList.add('visible');
    currentBatch = b;

    // update dots
    document.querySelectorAll('.bi-dot').forEach(d => d.classList.toggle('active', +d.dataset.b === b));
  }

  function scrollToAnchor(frame, anchor) {
    // try to scroll inside the iframe to the anchor
    try {
      const doc = frame.contentDocument || frame.contentWindow.document;
      const el = doc.getElementById(anchor);
      if (el) {
        el.scrollIntoView({ behavior: 'smooth', block: 'start' });
      }
    } catch (e) {
      // cross-origin fallback: use hash
      try {
        const base = frame.src.split('#')[0];
        frame.src = base + '#' + anchor;
      } catch (_) {}
    }
  }

  // NAV button clicks
  document.querySelectorAll('.nav-btn[data-batch]').forEach(btn => {
    btn.addEventListener('click', () => {
      const b = +btn.dataset.batch;
      const anchor = btn.dataset.anchor;

      // update active state
      document.querySelectorAll('.nav-btn').forEach(b2 => b2.classList.remove('active'));
      btn.classList.add('active');

      if (b !== currentBatch) {
        switchBatch(b);
        // scroll after load
        const frame = getFrame(b);
        if (loaded.has(b) && frame.src !== '') {
          setTimeout(() => scrollToAnchor(frame, anchor), 300);
        } else {
          frame.addEventListener('load', () => {
            setTimeout(() => scrollToAnchor(frame, anchor), 200);
          }, { once: true });
        }
      } else {
        const frame = getFrame(b);
        scrollToAnchor(frame, anchor);
      }
    });
  });

  // Dot clicks
  document.querySelectorAll('.bi-dot').forEach(dot => {
    dot.addEventListener('click', () => switchBatch(+dot.dataset.b));
  });

  // Scroll hint
  let hintTimer;
  document.querySelectorAll('.batch-frame').forEach(frame => {
    frame.addEventListener('mouseenter', () => {
      const hint = document.getElementById('scroll-hint');
      hint.classList.add('show');
      clearTimeout(hintTimer);
      hintTimer = setTimeout(() => hint.classList.remove('show'), 2000);
    });
  });

  // Batch 1 load complete → hide loading
  getFrame(1).addEventListener('load', () => {
    document.getElementById('loading').classList.add('hidden');
  }, { once: true });

})();
</script>
</body>
</html>
