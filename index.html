<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>台灣山域搜救 · 教學平台</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;600;700&family=Noto+Sans+TC:wght@400;500;700;900&display=swap" rel="stylesheet">
<style>
:root {
  --paper:  #F5F0E8;
  --stone:  #EDE7D9;
  --stone2: #E3DDD0;
  --rule:   #CFC9BC;
  --ink:    #1C1A17;
  --dim:    #6B6560;
  --dim2:   #9A948E;
  --fire:   #C8401A;
  --moss:   #3D5C3A;
  --slate:  #2C4A6E;
  --mono: 'IBM Plex Mono', monospace;
  --sans:  'Noto Sans TC', sans-serif;
  --nav-h: 52px;
  --spine: 4px;
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html, body { height: 100%; overflow: hidden; background: var(--paper); font-family: var(--sans); -webkit-font-smoothing: antialiased; }

/* SPINE */
.spine {
  position: fixed; left: 0; top: 0; bottom: 0;
  width: var(--spine); background: var(--fire); z-index: 200;
}

/* NAV */
.top-nav {
  position: fixed; top: 0; left: var(--spine); right: 0;
  height: var(--nav-h);
  background: var(--paper);
  border-bottom: 2px solid var(--rule);
  display: flex; align-items: center;
  padding: 0 1rem;
  gap: 0;
  z-index: 100;
  overflow: hidden;
}

.nav-logo {
  font-family: var(--mono); font-weight: 700; font-size: 13px;
  color: var(--fire); letter-spacing: .08em;
  white-space: nowrap; flex: none;
  margin-right: .75rem;
}

.nav-scroll-area {
  display: flex; align-items: center;
  gap: 0;
  overflow-x: auto;
  scrollbar-width: none;
  flex: 1;
  -webkit-overflow-scrolling: touch;
}
.nav-scroll-area::-webkit-scrollbar { display: none; }

.nav-divider {
  width: 1px; height: 18px;
  background: var(--rule); flex: none;
  margin: 0 .35rem;
}

.nav-group {
  display: flex; align-items: center; gap: .1rem; flex: none;
}

.group-label {
  font-family: var(--mono); font-size: 9px; font-weight: 700;
  color: var(--dim2); letter-spacing: .14em;
  padding: 0 .35rem; flex: none; white-space: nowrap;
}

.nav-btn {
  font-family: var(--mono); font-size: 11px; font-weight: 600;
  color: var(--dim);
  padding: .32rem .55rem; border-radius: 4px;
  white-space: nowrap; cursor: pointer;
  border: none; background: none;
  border-left: 3px solid transparent;
  transition: .15s; flex: none;
}
.nav-btn:hover { color: var(--ink); background: var(--stone); }
.nav-btn.active { color: var(--fire); background: #C8401A14; }

.nav-btn[data-layer="A"] { border-left-color: var(--fire); }
.nav-btn[data-layer="E"] { border-left-color: #9B5E1A; }
.nav-btn[data-layer="B"] { border-left-color: var(--moss); }
.nav-btn[data-layer="C"] { border-left-color: var(--slate); }
.nav-btn[data-layer="D"] { border-left-color: #4A4540; }

.nav-meta {
  font-family: var(--mono); font-size: 10px; color: var(--dim2);
  text-align: right; line-height: 1.5; flex: none;
  margin-left: .75rem; white-space: nowrap;
}

/* IFRAME */
.frame-wrap {
  position: fixed;
  top: var(--nav-h); left: var(--spine); right: 0; bottom: 0;
}
.batch-frame {
  position: absolute; inset: 0;
  width: 100%; height: 100%;
  border: none; display: none;
  background: var(--paper);
}
.batch-frame.visible { display: block; }

/* LOADING */
.loading {
  position: absolute; inset: 0;
  display: flex; align-items: center; justify-content: center;
  flex-direction: column; gap: 1rem;
  background: var(--paper); z-index: 10;
  transition: opacity .35s;
}
.loading.hidden { opacity: 0; pointer-events: none; }
.loading-spinner {
  width: 34px; height: 34px;
  border: 3px solid var(--rule); border-top-color: var(--fire);
  border-radius: 50%; animation: spin .8s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }
.loading-text { font-family: var(--mono); font-size: 12px; color: var(--dim2); letter-spacing: .1em; }

/* BATCH DOTS */
.batch-dots {
  position: fixed; bottom: 1.25rem; left: calc(var(--spine) + 1.25rem);
  display: flex; gap: .4rem; z-index: 50;
}
.bi-dot {
  height: 4px; border-radius: 2px; cursor: pointer;
  transition: width .25s, background .25s;
  width: 24px; background: var(--rule2, #BDB6A8);
}
.bi-dot.active { width: 32px; }
.bi-dot[data-b="1"]        { background: #D4C8B8; }
.bi-dot[data-b="1"].active { background: var(--fire); }
.bi-dot[data-b="2"]        { background: #C8D0C0; }
.bi-dot[data-b="2"].active { background: var(--moss); }
.bi-dot[data-b="3"]        { background: #C0C8D4; }
.bi-dot[data-b="3"].active { background: var(--slate); }
.bi-dot[data-b="4"]        { background: #C4C0BC; }
.bi-dot[data-b="4"].active { background: #4A4540; }
</style>
</head>
<body>

<div class="spine"></div>

<nav class="top-nav">
  <div class="nav-logo">SAR // TW</div>

  <div class="nav-scroll-area">

    <div class="nav-group">
      <span class="group-label">A</span>
      <button class="nav-btn active" data-batch="1" data-layer="A" data-anchor="hero">首頁</button>
      <button class="nav-btn" data-batch="1" data-layer="A" data-anchor="a1">四個詞</button>
      <button class="nav-btn" data-batch="1" data-layer="A" data-anchor="a2">失溫333</button>
    </div>

    <div class="nav-divider"></div>

    <div class="nav-group">
      <span class="group-label">E</span>
      <button class="nav-btn" data-batch="1" data-layer="E" data-anchor="e1">危害速查</button>
      <button class="nav-btn" data-batch="1" data-layer="E" data-anchor="e2">捷思陷阱</button>
      <button class="nav-btn" data-batch="1" data-layer="E" data-anchor="e3">評估表</button>
    </div>

    <div class="nav-divider"></div>

    <div class="nav-group">
      <span class="group-label">B</span>
      <button class="nav-btn" data-batch="2" data-layer="B" data-anchor="b1">環境認知</button>
      <button class="nav-btn" data-batch="2" data-layer="B" data-anchor="b2">搜救決策</button>
      <button class="nav-btn" data-batch="2" data-layer="B" data-anchor="b3">失蹤者</button>
    </div>

    <div class="nav-divider"></div>

    <div class="nav-group">
      <span class="group-label">C</span>
      <button class="nav-btn" data-batch="2" data-layer="C" data-anchor="c1">繩索力學</button>
      <button class="nav-btn" data-batch="3" data-layer="C" data-anchor="c2">固定點</button>
      <button class="nav-btn" data-batch="3" data-layer="C" data-anchor="c3">情境模擬</button>
    </div>

    <div class="nav-divider"></div>

    <div class="nav-group">
      <span class="group-label">D</span>
      <button class="nav-btn" data-batch="4" data-layer="D" data-anchor="d1">三地統計</button>
      <button class="nav-btn" data-batch="4" data-layer="D" data-anchor="d2">YOSAR</button>
    </div>

  </div>

  <div class="nav-meta">北搜 徐汶翰</div>
</nav>

<div class="frame-wrap">
  <div class="loading" id="loading">
    <div class="loading-spinner"></div>
    <div class="loading-text">載入中…</div>
  </div>
  <iframe class="batch-frame visible" id="frame-1" src="sar_training_batch1.html" title="Batch 1"></iframe>
  <iframe class="batch-frame" id="frame-2" src="" data-src="sar_training_batch2.html" title="Batch 2"></iframe>
  <iframe class="batch-frame" id="frame-3" src="" data-src="sar_training_batch3.html" title="Batch 3"></iframe>
  <iframe class="batch-frame" id="frame-4" src="" data-src="sar_training_batch4.html" title="Batch 4"></iframe>
</div>

<div class="batch-dots">
  <div class="bi-dot active" data-b="1" title="A · E"></div>
  <div class="bi-dot" data-b="2" title="B · C1"></div>
  <div class="bi-dot" data-b="3" title="C2 · C3"></div>
  <div class="bi-dot" data-b="4" title="D"></div>
</div>

<script>
(function () {
  'use strict';

  let current = 1;
  const loaded = new Set([1]);

  function frame(b) { return document.getElementById('frame-' + b); }

  function scrollTo(b, anchor) {
    try {
      const doc = frame(b).contentDocument || frame(b).contentWindow.document;
      const el = doc.getElementById(anchor);
      if (el) el.scrollIntoView({ behavior: 'smooth', block: 'start' });
    } catch (_) {}
  }

  function switchBatch(b, anchor) {
    // lazy load
    if (!loaded.has(b)) {
      document.getElementById('loading').classList.remove('hidden');
      const f = frame(b);
      f.src = f.dataset.src;
      f.addEventListener('load', () => {
        document.getElementById('loading').classList.add('hidden');
        if (anchor) setTimeout(() => scrollTo(b, anchor), 150);
      }, { once: true });
      loaded.add(b);
    } else {
      if (anchor) setTimeout(() => scrollTo(b, anchor), 80);
    }

    // swap frame
    document.querySelectorAll('.batch-frame').forEach(f => f.classList.remove('visible'));
    frame(b).classList.add('visible');
    current = b;

    // dots
    document.querySelectorAll('.bi-dot').forEach(d => d.classList.toggle('active', +d.dataset.b === b));
  }

  // nav buttons
  document.querySelectorAll('.nav-btn[data-batch]').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      const b = +btn.dataset.batch;
      const anchor = btn.dataset.anchor;
      if (b !== current) {
        switchBatch(b, anchor);
      } else {
        scrollTo(b, anchor);
      }
    });
  });

  // dots
  document.querySelectorAll('.bi-dot').forEach(dot => {
    dot.addEventListener('click', () => switchBatch(+dot.dataset.b));
  });

  // hide loading once batch 1 loads
  frame(1).addEventListener('load', () => {
    document.getElementById('loading').classList.add('hidden');
  }, { once: true });

})();
</script>
</body>
</html>
